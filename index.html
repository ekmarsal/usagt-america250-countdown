<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>America Turns 250 &middot; Countdown to July 4, 2026</title>
  <meta name="description" content="A live countdown to July 4, 2026 — America's 250th anniversary." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Playfair+Display:wght@700;900&display=swap"
    rel="stylesheet"
  />

  <style>
    :root {
      --navy: #0a1f44;
      --red: #b22234;
      --white: #ffffff;
      --gold: #ffd166;
      --soft: rgba(255, 255, 255, 0.85);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { height: 100%; }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: var(--white);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 6vw 5vw;
      overflow-x: hidden;
      background: linear-gradient(
        135deg,
        #0a1f44,
        #122a5e,
        #6b1620,
        #b22234,
        #122a5e,
        #0a1f44
      );
      background-size: 400% 400%;
      animation: gradientShift 22s ease infinite;
    }

    @keyframes gradientShift {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .wrap {
      max-width: 960px;
      width: 100%;
      animation: rise 1s ease both;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .flag {
      font-size: clamp(2rem, 6vw, 3.5rem);
      letter-spacing: 0.4em;
      margin-bottom: 1.2rem;
    }

    h1 {
      font-family: 'Playfair Display', Georgia, serif;
      font-weight: 900;
      line-height: 1.02;
      font-size: clamp(2.6rem, 9vw, 6rem);
      text-shadow: 0 4px 28px rgba(0, 0, 0, 0.35);
    }

    h1 .accent { color: var(--gold); }

    .subline {
      margin: 1.1rem auto 0;
      max-width: 36ch;
      font-size: clamp(1rem, 2.6vw, 1.35rem);
      color: var(--soft);
      font-weight: 400;
    }

    .countdown {
      margin-top: clamp(2.2rem, 6vw, 3.5rem);
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: clamp(0.6rem, 2.5vw, 1.6rem);
    }

    .unit {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 18px;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      padding: clamp(1rem, 3vw, 1.8rem) clamp(0.8rem, 3vw, 2rem);
      min-width: clamp(76px, 20vw, 150px);
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.25);
    }

    .unit .num {
      font-family: 'Playfair Display', Georgia, serif;
      font-weight: 700;
      font-size: clamp(2.4rem, 9vw, 4.6rem);
      line-height: 1;
      font-variant-numeric: tabular-nums;
      text-shadow: 0 3px 18px rgba(0, 0, 0, 0.35);
    }

    .unit .label {
      margin-top: 0.6rem;
      font-size: clamp(0.65rem, 2vw, 0.85rem);
      text-transform: uppercase;
      letter-spacing: 0.22em;
      color: var(--soft);
    }

    .celebrate {
      margin-top: clamp(2.2rem, 6vw, 3.5rem);
      font-family: 'Playfair Display', Georgia, serif;
      font-weight: 700;
      font-size: clamp(1.8rem, 6vw, 3rem);
      color: var(--gold);
      animation: pop 0.8s ease both, glow 2.4s ease-in-out infinite;
    }

    .celebrate .sparkle { font-size: 1.4em; }

    @keyframes pop {
      from { opacity: 0; transform: scale(0.85); }
      to   { opacity: 1; transform: scale(1); }
    }

    @keyframes glow {
      0%, 100% { text-shadow: 0 0 12px rgba(255, 209, 102, 0.4); }
      50%      { text-shadow: 0 0 32px rgba(255, 209, 102, 0.9); }
    }

    .hidden { display: none; }

    footer {
      margin-top: clamp(2rem, 5vw, 3rem);
      font-size: 0.8rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.55);
    }
  </style>
</head>
<body>
  <main class="wrap">
    <div class="flag" aria-hidden="true">&#x1F1FA;&#x1F1F8;</div>

    <h1>America Turns <span class="accent">250</span></h1>
    <p class="subline">Counting down to the Semiquincentennial &mdash; July 4, 2026.</p>

    <section class="countdown" id="countdown" aria-live="polite">
      <div class="unit"><div class="num" id="days">--</div><div class="label">Days</div></div>
      <div class="unit"><div class="num" id="hours">--</div><div class="label">Hours</div></div>
      <div class="unit"><div class="num" id="minutes">--</div><div class="label">Minutes</div></div>
      <div class="unit"><div class="num" id="seconds">--</div><div class="label">Seconds</div></div>
    </section>

    <div class="celebrate hidden" id="celebrate">
      <span class="sparkle">&#x1F386;</span>
      Happy 250th Birthday, America!
      <span class="sparkle">&#x1F386;</span>
    </div>

    <footer>1776 &mdash; 2026</footer>
  </main>

  <script>
    (function () {
      // Local midnight on July 4, 2026.
      var target = new Date(2026, 6, 4, 0, 0, 0, 0).getTime();

      var elDays = document.getElementById('days');
      var elHours = document.getElementById('hours');
      var elMinutes = document.getElementById('minutes');
      var elSeconds = document.getElementById('seconds');
      var countdown = document.getElementById('countdown');
      var celebrate = document.getElementById('celebrate');

      function pad(n) { return n < 10 ? '0' + n : '' + n; }

      function tick() {
        var diff = target - Date.now();

        if (diff <= 0) {
          countdown.classList.add('hidden');
          celebrate.classList.remove('hidden');
          return false;
        }

        var totalSeconds = Math.floor(diff / 1000);
        var days = Math.floor(totalSeconds / 86400);
        var hours = Math.floor((totalSeconds % 86400) / 3600);
        var minutes = Math.floor((totalSeconds % 3600) / 60);
        var seconds = totalSeconds % 60;

        elDays.textContent = days;
        elHours.textContent = pad(hours);
        elMinutes.textContent = pad(minutes);
        elSeconds.textContent = pad(seconds);
        return true;
      }

      if (tick()) {
        var timer = setInterval(function () {
          if (!tick()) clearInterval(timer);
        }, 1000);
      }
    })();
  </script>
</body>
</html>

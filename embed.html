<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>America Turns 250 &middot; Countdown Banner</title>
  <meta name="description" content="A live countdown banner to July 4, 2026 — America's 250th anniversary. Presented by USA Guided Tours." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Playfair+Display:wght@700;900&display=swap"
    rel="stylesheet"
  />

  <style>
    :root {
      --navy: #3c6aa1;
      --red: #d43633;
      --cream: #fdf6ec;
      --gold: #f2b541;
      --soft: rgba(253, 246, 236, 0.82);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { height: 100%; }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: var(--cream);
      /* A contained band — driven by its own height, never the viewport. */
      min-height: 300px;
      height: 300px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 1.4rem 1.6rem;
      overflow: hidden;
      background: linear-gradient(120deg, var(--navy) 0%, #2f5687 45%, #a82c2c 78%, var(--red) 100%);
    }

    .band {
      width: 100%;
      max-width: 1100px;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: clamp(1rem, 4vw, 2.6rem);
    }

    .intro {
      text-align: left;
      max-width: 30ch;
    }

    .intro .flag {
      font-size: 1.3rem;
      letter-spacing: 0.3em;
      margin-bottom: 0.4rem;
    }

    h1 {
      font-family: 'Playfair Display', Georgia, serif;
      font-weight: 900;
      line-height: 1.02;
      font-size: clamp(1.7rem, 4.2vw, 2.9rem);
      text-shadow: 0 3px 16px rgba(0, 0, 0, 0.28);
    }

    h1 .accent { color: var(--gold); }

    .subline {
      margin-top: 0.5rem;
      font-size: clamp(0.78rem, 1.6vw, 0.98rem);
      color: var(--soft);
      font-weight: 400;
      line-height: 1.35;
    }

    .countdown {
      display: flex;
      flex-wrap: nowrap;
      justify-content: center;
      gap: clamp(0.45rem, 1.6vw, 1rem);
    }

    .unit {
      background: rgba(253, 246, 236, 0.10);
      border: 1px solid rgba(253, 246, 236, 0.20);
      border-radius: 14px;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      padding: clamp(0.6rem, 1.8vw, 1rem) clamp(0.55rem, 1.8vw, 1.1rem);
      min-width: clamp(58px, 12vw, 92px);
      box-shadow: 0 8px 26px rgba(0, 0, 0, 0.22);
    }

    .unit .num {
      font-family: 'Playfair Display', Georgia, serif;
      font-weight: 700;
      font-size: clamp(1.6rem, 4.5vw, 2.9rem);
      line-height: 1;
      font-variant-numeric: tabular-nums;
      text-shadow: 0 2px 12px rgba(0, 0, 0, 0.3);
    }

    .unit .label {
      margin-top: 0.4rem;
      font-size: clamp(0.55rem, 1.3vw, 0.7rem);
      text-transform: uppercase;
      letter-spacing: 0.18em;
      color: var(--soft);
    }

    .celebrate {
      font-family: 'Playfair Display', Georgia, serif;
      font-weight: 700;
      font-size: clamp(1.4rem, 4vw, 2.4rem);
      color: var(--gold);
      animation: glow 2.4s ease-in-out infinite;
    }

    .celebrate .sparkle { font-size: 1.2em; }

    @keyframes glow {
      0%, 100% { text-shadow: 0 0 10px rgba(242, 181, 65, 0.4); }
      50%      { text-shadow: 0 0 26px rgba(242, 181, 65, 0.85); }
    }

    .hidden { display: none; }

    /* Phones: stack the intro above the ticking numbers, keep it inside the band. */
    @media (max-width: 620px) {
      body { height: auto; min-height: 300px; padding: 1.2rem; }
      .band { flex-direction: column; gap: 1rem; }
      .intro { text-align: center; max-width: none; }
      .countdown { flex-wrap: wrap; }
    }
  </style>
</head>
<body>
  <div class="band">
    <div class="intro">
      <div class="flag" aria-hidden="true">&#x1F1FA;&#x1F1F8;</div>
      <h1>America Turns <span class="accent">250</span></h1>
      <p class="subline">Counting down to the Semiquincentennial &mdash; July 4, 2026.</p>
    </div>

    <section class="countdown" id="countdown" aria-live="polite">
      <div class="unit"><div class="num" id="days">--</div><div class="label">Days</div></div>
      <div class="unit"><div class="num" id="hours">--</div><div class="label">Hours</div></div>
      <div class="unit"><div class="num" id="minutes">--</div><div class="label">Minutes</div></div>
      <div class="unit"><div class="num" id="seconds">--</div><div class="label">Seconds</div></div>
    </section>

    <div class="celebrate hidden" id="celebrate">
      <span class="sparkle">&#x1F386;</span>
      Happy 250th Birthday, America!
      <span class="sparkle">&#x1F386;</span>
    </div>
  </div>

  <script>
    (function () {
      // Local midnight on July 4, 2026.
      var target = new Date(2026, 6, 4, 0, 0, 0, 0).getTime();

      var elDays = document.getElementById('days');
      var elHours = document.getElementById('hours');
      var elMinutes = document.getElementById('minutes');
      var elSeconds = document.getElementById('seconds');
      var countdown = document.getElementById('countdown');
      var celebrate = document.getElementById('celebrate');

      function pad(n) { return n < 10 ? '0' + n : '' + n; }

      function tick() {
        var diff = target - Date.now();

        if (diff <= 0) {
          countdown.classList.add('hidden');
          celebrate.classList.remove('hidden');
          return false;
        }

        var totalSeconds = Math.floor(diff / 1000);
        var days = Math.floor(totalSeconds / 86400);
        var hours = Math.floor((totalSeconds % 86400) / 3600);
        var minutes = Math.floor((totalSeconds % 3600) / 60);
        var seconds = totalSeconds % 60;

        elDays.textContent = days;
        elHours.textContent = pad(hours);
        elMinutes.textContent = pad(minutes);
        elSeconds.textContent = pad(seconds);
        return true;
      }

      if (tick()) {
        var timer = setInterval(function () {
          if (!tick()) clearInterval(timer);
        }, 1000);
      }
    })();
  </script>
</body>
</html>
